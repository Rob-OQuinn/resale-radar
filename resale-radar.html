const PLAT_COLORS = {
  "eBay":"#E53238","Mercari":"#FF4F00","Poshmark":"#CC0066",
  "Etsy":"#F56400","Facebook Marketplace":"#1877F2"
};

let currentCat = 'all';
let expanded = new Set();
let lastItems = [];

// ─── Google Trends RSS (via allorigins CORS proxy) ───────────────────────────
async function fetchGoogleTrends(cat) {
  const keywords = {
    all: 'resale',
    electronics: 'retro electronics',
    disney: 'disney collectibles',
    designer: 'designer handbag resale',
    toys: 'vintage toys',
    antiques: 'antiques',
    jewelry: 'vintage jewelry'
  };
  const kw = encodeURIComponent(keywords[cat] || 'resale');
  const rssUrl = `https://trends.google.com/trends/trendingsearches/daily/rss?geo=US`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
  try {
    const res = await fetch(proxy, { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, 'text/xml');
    const items = Array.from(xml.querySelectorAll('item')).slice(0, 6);
    return items.map(it => ({
      term: it.querySelector('title')?.textContent || '',
      volume: it.querySelector('approx_traffic')?.textContent || ''
    })).filter(t => t.term);
  } catch (e) {
    return [];
  }
}

// ─── eBay sold listings search URL builder ───────────────────────────────────
function ebayUrl(query) {
  return `https://www.ebay.com/sch/i.html?_nkw=${query}&LH_Sold=1&LH_Complete=1&_sop=13`;
}
function mercariUrl(query) {
  return `https://www.mercari.com/search/?keyword=${encodeURIComponent(query)}&status=sold_out`;
}

function selectCat(cat, btn) {
  currentCat = cat;
  expanded.clear();
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  loadData();
}

function refresh() { expanded.clear(); loadData(); }

async function loadData() {
  setStatus('Loading live data...');
  showLoading();

  const items = ITEMS[currentCat] || ITEMS.all;
  lastItems = items;

  // Try to fetch Google Trends in parallel (bonus data if it works)
  const trendsPromise = fetchGoogleTrends(currentCat);

  // Simulate brief load so it feels live
  await new Promise(r => setTimeout(r, 600));

  const trends = await trendsPromise;
  renderAll(items, trends);
  setStatus(`Updated ${new Date().toLocaleTimeString()} · Tap cards for details · Links open eBay sold listings`);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showLoading() {
  document.getElementById('output').innerHTML = `
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <p>Pulling live market data...</p>
      <small>Fetching trends & sold listings</small>
    </div>`;
}

function toggleCard(i) {
  if (expanded.has(i)) expanded.delete(i); else expanded.add(i);
  renderAll(lastItems, window._lastTrends || []);
}

function renderAll(items, trends) {
  window._lastTrends = trends;
  const pc = (m) => m==='High'?'#16a34a':m==='Medium'?'#d97706':'#dc2626';

  let trendsHtml = '';
  if (trends && trends.length > 0) {
    trendsHtml = `
      <div class="section-title">📈 Google Trending Searches Right Now</div>
      <div class="trending-grid">
        ${trends.map((t,i) => `
          <div class="trend-chip" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(t.term+' resale value')}','_blank')">
            <div class="rank">#${i+1} TRENDING</div>
            <div class="term">${t.term}</div>
            ${t.volume ? `<div class="volume">${t.volume} searches</div>` : ''}
          </div>`).join('')}
      </div>`;
  }

  const itemsHtml = `
    <div class="section-title">💰 Best Items to Flip Right Now</div>
    <div class="items">
      ${items.map((item,i) => {
        const color = pc(item.margin);
        const exp = expanded.has(i);
        const plats = (item.platforms||[]).map(p =>
          `<span class="plat-badge" style="background:${PLAT_COLORS[p]||'#555'}">${p}</span>`).join('');
        return `
          <div class="card" onclick="toggleCard(${i})">
            <div class="card-bar" style="background:${color}"></div>
            <div class="card-top">
              <div class="card-name"><span class="badge-num">#${i+1}</span>${item.name}</div>
              <span class="badge-margin" style="background:${color}18;color:${color}">${item.margin}</span>
            </div>
            <div class="prices">
              <div class="price-box" style="background:#f9fafb">
                <div class="price-label">Buy For</div>
                <div class="price-val" style="color:#111">${item.buy}</div>
              </div>
              <div class="price-box" style="background:#f0fdf4">
                <div class="price-label">Sell For</div>
                <div class="price-val" style="color:#16a34a">${item.sell}</div>
              </div>
            </div>
            <div class="card-desc">${item.desc}</div>
            ${exp ? `
              <div class="card-details">
                <div class="platforms">${plats}</div>
                <div class="meta-grid">
                  <div class="meta-box"><div class="meta-label">Demand</div><div class="meta-val">${item.demand}</div></div>
                  <div class="meta-box"><div class="meta-label">Sell Speed</div><div class="meta-val">${item.speed}</div></div>
                </div>
                <div class="tip-box"><strong>💡 Pro Tip:</strong> ${item.tip}</div>
                <div class="look-box"><strong>🔍 Look for:</strong> ${item.look}</div>
                <div class="sold-box">
                  <strong>🔗 Check real sold prices:</strong><br>
                  <a href="${ebayUrl(item.ebay)}" target="_blank" style="color:#15803d;font-weight:700">→ eBay Sold Listings ↗</a>
                  &nbsp;&nbsp;
                  <a href="${mercariUrl(item.mercari)}" target="_blank" style="color:#15803d;font-weight:700">→ Mercari Sold ↗</a>
                </div>
              </div>` : ''}
            <div class="toggle-hint">${exp?'▲ Less':'▼ Tap for details + live price links'}</div>
          </div>`;
      }).join('')}
    </div>
    <p class="source-note">Sold price links go directly to eBay & Mercari completed listings · Always verify current prices before buying</p>`;

  document.getElementById('output').innerHTML = trendsHtml + itemsHtml;
}
